<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DM Informática - Em Manutenção</title>
    <style>
        :root {
            --bg: #050505;
            --orange: #ff6b1a;
            --orange-glow: #ff8c42;
            --orange-dark: #cc4f00;
            --text: #e0e0e0;
            --text-secondary: #a0a0a0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg);
            font-family: 'Segoe UI', 'Inter', system-ui, -apple-system, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
            user-select: none;
            -webkit-user-select: none;
        }

        /* Canvas para partículas */
        #particlesCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        /* Grid geométrico sutil no fundo */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                linear-gradient(rgba(255, 107, 26, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 107, 26, 0.03) 1px, transparent 1px);
            background-size: 60px 60px;
            mask-image: radial-gradient(ellipse at center, black 30%, transparent 70%);
            -webkit-mask-image: radial-gradient(ellipse at center, black 30%, transparent 70%);
            z-index: 0;
            pointer-events: none;
        }

        /* Conteúdo principal */
        .container {
            position: relative;
            z-index: 2;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0;
            padding: 20px;
        }

        /* Área da Logo */
        .logo-area {
            margin-bottom: 20px;
            position: relative;
        }

        .logo-placeholder {
            width: 100px;
            height: 100px;
            border: 2px dashed rgba(255, 107, 26, 0.5);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(255, 107, 26, 0.6);
            font-size: 11px;
            letter-spacing: 1px;
            text-transform: uppercase;
            transition: all 0.4s ease;
            cursor: pointer;
            position: relative;
            background: rgba(255, 107, 26, 0.03);
        }

        .logo-placeholder:hover {
            border-color: var(--orange);
            color: var(--orange);
            box-shadow: 0 0 30px rgba(255, 107, 26, 0.2);
            background: rgba(255, 107, 26, 0.06);
        }

        .logo-placeholder .plus-icon {
            font-size: 28px;
            line-height: 1;
            opacity: 0.7;
        }

        /* Ícone de manutenção (engrenagem feita com CSS) */
        .gear-wrapper {
            position: relative;
            width: 90px;
            height: 90px;
            margin-bottom: 10px;
        }

        .gear-outer {
            position: absolute;
            inset: 0;
            border: 6px solid var(--orange);
            border-radius: 50%;
            animation: gearPulse 2.5s ease-in-out infinite;
            box-shadow:
                0 0 25px rgba(255, 107, 26, 0.6),
                0 0 60px rgba(255, 107, 26, 0.3),
                0 0 100px rgba(255, 107, 26, 0.15),
                inset 0 0 25px rgba(255, 107, 26, 0.1);
        }

        .gear-inner {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 30px;
            height: 30px;
            border: 3px solid var(--orange-glow);
            border-radius: 50%;
            animation: gearSpin 4s linear infinite;
            box-shadow: 0 0 15px rgba(255, 140, 66, 0.5);
        }

        .gear-spoke {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 70px;
            height: 4px;
            background: var(--orange);
            border-radius: 2px;
            transform-origin: center center;
            opacity: 0.7;
            box-shadow: 0 0 8px rgba(255, 107, 26, 0.4);
        }
        .gear-spoke:nth-child(1) {
            transform: translate(-50%, -50%) rotate(0deg);
        }
        .gear-spoke:nth-child(2) {
            transform: translate(-50%, -50%) rotate(60deg);
        }
        .gear-spoke:nth-child(3) {
            transform: translate(-50%, -50%) rotate(120deg);
        }

        @keyframes gearPulse {
            0%,
            100% {
                box-shadow: 0 0 25px rgba(255, 107, 26, 0.6), 0 0 60px rgba(255, 107, 26, 0.3), 0 0 100px rgba(255, 107, 26, 0.15), inset 0 0 25px rgba(255, 107, 26, 0.1);
            }
            50% {
                box-shadow: 0 0 40px rgba(255, 107, 26, 0.9), 0 0 80px rgba(255, 107, 26, 0.5), 0 0 140px rgba(255, 107, 26, 0.25), inset 0 0 40px rgba(255, 107, 26, 0.2);
            }
        }

        @keyframes gearSpin {
            0% {
                transform: translate(-50%, -50%) rotate(0deg);
            }
            100% {
                transform: translate(-50%, -50%) rotate(360deg);
            }
        }

        /* Título */
        .title {
            font-size: clamp(1.8rem, 4vw, 3.2rem);
            font-weight: 700;
            color: #ffffff;
            letter-spacing: -0.02em;
            margin-top: 8px;
            position: relative;
        }

        .title .highlight {
            color: var(--orange);
            text-shadow: 0 0 40px rgba(255, 107, 26, 0.7), 0 0 80px rgba(255, 107, 26, 0.3);
            animation: textGlow 2.5s ease-in-out infinite;
        }

        @keyframes textGlow {
            0%,
            100% {
                text-shadow: 0 0 40px rgba(255, 107, 26, 0.7), 0 0 80px rgba(255, 107, 26, 0.3);
            }
            50% {
                text-shadow: 0 0 60px rgba(255, 140, 66, 1), 0 0 120px rgba(255, 107, 26, 0.6), 0 0 180px rgba(255, 107, 26, 0.3);
            }
        }

        /* Subtítulo */
        .subtitle {
            font-size: clamp(0.95rem, 1.8vw, 1.2rem);
            color: var(--text-secondary);
            font-weight: 400;
            letter-spacing: 0.03em;
            margin-top: 6px;
            max-width: 500px;
            line-height: 1.5;
        }

        /* Nome da empresa */
        .company-name {
            font-size: 1rem;
            font-weight: 600;
            color: var(--orange-glow);
            letter-spacing: 0.08em;
            text-transform: uppercase;
            margin-top: 18px;
            opacity: 0.85;
        }

        /* Barra de progresso decorativa */
        .progress-bar {
            width: 220px;
            height: 3px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 10px;
            margin-top: 25px;
            overflow: hidden;
            position: relative;
        }

        .progress-bar-fill {
            height: 100%;
            background: var(--orange);
            border-radius: 10px;
            width: 40%;
            animation: progressMove 3s ease-in-out infinite;
            box-shadow: 0 0 12px rgba(255, 107, 26, 0.6);
        }

        @keyframes progressMove {
            0% {
                width: 20%;
                margin-left: 0%;
            }
            50% {
                width: 50%;
                margin-left: 25%;
            }
            100% {
                width: 20%;
                margin-left: 60%;
            }
        }

        /* Rodapé */
        .footer-note {
            position: fixed;
            bottom: 30px;
            z-index: 2;
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.3);
            letter-spacing: 0.05em;
            text-align: center;
        }

        /* Responsivo */
        @media (max-width: 480px) {
            .gear-wrapper {
                width: 65px;
                height: 65px;
            }
            .gear-spoke {
                width: 50px;
                height: 3px;
            }
            .gear-inner {
                width: 22px;
                height: 22px;
            }
            .logo-placeholder {
                width: 75px;
                height: 75px;
                border-radius: 16px;
            }
            .progress-bar {
                width: 160px;
            }
        }
    </style>
</head>
<body>

    <!-- Canvas para partículas -->
    <canvas id="particlesCanvas"></canvas>

    <!-- Conteúdo principal -->
    <div class="container">

        <!-- Área da Logo -->
        <!--
        ╔═══════════════════════════════════════╗
        ║  INSIRA SUA LOGO AQUI               ║
        ║  Substitua a div abaixo por:        ║
        ║  <img src="sua-logo.png"            ║
        ║       alt="DM Informática"          ║
        ║       class="logo-image">           ║
        ╚═══════════════════════════════════════╝
        -->
         <img src="logo.png" width="180"   
           alt="DM Informática"         
            class="logo-image">
		<br></br>

        <!-- Ícone de engrenagem animado -->
        <div class="gear-wrapper">
            <div class="gear-outer"></div>
            <div class="gear-spoke"></div>
            <div class="gear-spoke"></div>
            <div class="gear-spoke"></div>
            <div class="gear-inner"></div>
        </div>

        <!-- Título -->
        <h1 class="title">
            Site em <span class="highlight">Manutenção</span>
        </h1>

        <!-- Subtítulo -->
        <p class="subtitle">
            Nossa equipe está realizando ajustes técnicos para oferecer
            uma experiência ainda melhor. Voltaremos em breve.
        </p>

        <!-- Nome da empresa -->
        <div class="company-name">DM Informática</div>

        <!-- Barra de progresso decorativa -->
        <div class="progress-bar">
            <div class="progress-bar-fill"></div>
        </div>
    </div>

    <!-- Nota de rodapé -->
    <div class="footer-note">Manutenção programada • Obrigado pela paciência</div>

    <script>
        // ==================== PARTÍCULAS NO CANVAS ====================
        const canvas = document.getElementById('particlesCanvas');
        const ctx = canvas.getContext('2d');

        let particles = [];
        const PARTICLE_COUNT = 80;

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', () => {
            resizeCanvas();
            initParticles();
        });

        class Particle {
            constructor() {
                this.reset(true);
            }

            reset(initial = false) {
                this.x = Math.random() * canvas.width;
                this.y = initial ? Math.random() * canvas.height : canvas.height + Math.random() * 100;
                this.size = Math.random() * 2.5 + 0.8;
                this.speedY = -(Math.random() * 1.2 + 0.3);
                this.speedX = (Math.random() - 0.5) * 0.6;
                this.opacity = Math.random() * 0.7 + 0.2;
                this.flickerSpeed = Math.random() * 0.02 + 0.005;
                this.flickerOffset = Math.random() * Math.PI * 2;
                this.hue = Math.random() < 0.5 ? '255, 107, 26' : '255, 140, 66';
            }

            update() {
                this.y += this.speedY;
                this.x += this.speedX;
                this.opacity += Math.sin(Date.now() * this.flickerSpeed + this.flickerOffset) * 0.003;
                this.opacity = Math.max(0.1, Math.min(0.9, this.opacity));

                // Reset quando sai da tela
                if (this.y < -20 || this.x < -20 || this.x > canvas.width + 20) {
                    this.reset();
                }
                // Mantém dentro dos limites laterais
                if (this.x < 0) this.x = canvas.width;
                if (this.x > canvas.width) this.x = 0;
            }

            draw(ctx) {
                ctx.save();
                ctx.globalAlpha = this.opacity;
                ctx.fillStyle = `rgba(${this.hue}, ${this.opacity + 0.2})`;
                ctx.shadowColor = `rgba(${this.hue}, 0.7)`;
                ctx.shadowBlur = this.size * 4;
                ctx.beginPath();
                // Pequenos losangos/quadrados rotacionados
                const cx = this.x;
                const cy = this.y;
                const s = this.size;
                ctx.moveTo(cx, cy - s);
                ctx.lineTo(cx + s, cy);
                ctx.lineTo(cx, cy + s);
                ctx.lineTo(cx - s, cy);
                ctx.closePath();
                ctx.fill();
                ctx.restore();
            }
        }

        function initParticles() {
            particles = [];
            for (let i = 0; i < PARTICLE_COUNT; i++) {
                particles.push(new Particle());
            }
        }
        initParticles();

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => {
                p.update();
                p.draw(ctx);
            });

            // Conectar partículas próximas com linhas tênues
            for (let i = 0; i < particles.length; i++) {
                for (let j = i + 1; j < particles.length; j++) {
                    const dx = particles[i].x - particles[j].x;
                    const dy = particles[i].y - particles[j].y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < 100) {
                        ctx.save();
                        ctx.globalAlpha = (1 - dist / 100) * 0.12;
                        ctx.strokeStyle = 'rgba(255, 107, 26, 0.5)';
                        ctx.lineWidth = 0.5;
                        ctx.beginPath();
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(particles[j].x, particles[j].y);
                        ctx.stroke();
                        ctx.restore();
                    }
                }
            }

            requestAnimationFrame(animate);
        }
        animate();

        // Recriar partículas ao redimensionar
        window.addEventListener('resize', initParticles);
    </script>
</body>
</html>
